<!DOCTYPE html>
<html>
<head>
    <title>Fitness Prediction</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 6px;
        }
        button {
            width: 100%;
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            font-size: 16px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
<div class="container">
<h2>Fitness Prediction</h2>

<form action="{{ url_for('predict') }}" method="POST">

<div class="form-group">
    <label>Age</label>
    <input type="number" name="age" required>
</div>

<div class="form-group">
    <label>Height (cm)</label>
    <input type="number" name="height_cm" step="0.1" required>
</div>

<div class="form-group">
    <label>Weight (kg)</label>
    <input type="number" name="weight_kg" step="0.1" required>
</div>

<div class="form-group">
    <label>Heart Rate</label>
    <input type="number" name="heart_rate" required>
</div>

<div class="form-group">
    <label>Blood Pressure</label>
    <input type="number" name="blood_pressure" required>
</div>

<div class="form-group">
    <label>Sleep Hours</label>
    <input type="number" name="sleep_hours" step="0.1" required>
</div>

<div class="form-group">
    <label>Nutrition Quality (1–10)</label>
    <input type="number" name="nutrition_quality" min="1" max="10" required>
</div>

<div class="form-group">
    <label>Activity Index (1–10)</label>
    <input type="number" name="activity_index" min="1" max="10" required>
</div>

<div class="form-group">
    <label>Gender</label>
    <select name="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>
</div>

<div class="form-group">
    <label>Smokes</label>
    <select name="smokes">
        <option value="No">No</option>
        <option value="Yes">Yes</option>
    </select>
</div>

<button type="submit">Predict Fitness</button>
</form>
</div>
</body>
</html>
