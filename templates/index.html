<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Science Project</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Georgia, 'Times New Roman', serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #c8ddf0, #eef4fb, #d6eaf8);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 42px;
            color: #1a2e42;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        h2 {
            font-size: 22px;
            color: #4a6a82;
            font-weight: 400;
            margin-bottom: 30px;
        }

        p {
            font-size: 16px;
            color: #6a8da8;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, #2a7fd4, #4fb8e8);
            color: white;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            transition: 0.3s ease;
            box-shadow: 0 8px 20px rgba(42,127,212,0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(42,127,212,0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 35px 20px;
            }

            h1 {
                font-size: 30px;
            }

            h2 {
                font-size: 18px;
            }

            .btn {
                width: 100%;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome To Data Science Project Session</h1>
        <h2>Let’s Learn, Build, and Get Jobs</h2>
        <p>
            Explore our fitness prediction system and enter your health information
            to get started with the project.
        </p>

        <a href="{{ url_for('predict') }}" class="btn">Go To Prediction Form</a>
    </div>
</body>
</html>
